<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vida en Arte Kids — Sistema de Rotación</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #04060f;
  --bg2: #080d1a;
  --panel: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.07);
  --text: #e8f0ff;
  --muted: rgba(232,240,255,0.4);
  --accent: #00d4ff;

  --c0: #5c96b4;
  --c1: #ff2d3a;
  --c2: #ff6b1a;
  --c3: #1a9bbf;
  --c4: #5c96b4;
  --c5: #a8e63d;
  --c6: #ffe800;
  --c7: #d527c9;
}

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  overflow-x: hidden;
}

/* ── BACKGROUND ── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.grain {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.35;
}

/* ── LAYOUT ── */
.app {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 36px 20px 60px;
  width: 100%;
}

/* ── HEADER ── */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 32px;
  animation: fadeDown 0.8s ease both;
}

.brand-line {
  font-family: 'Exo 2', sans-serif;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.35em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 8px;
  opacity: 0.8;
}

.day-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(2.8rem, 7vw, 5.5rem);
  font-weight: 900;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  transition: opacity 0.3s;
}

.scanline {
  width: 100%;
  max-width: 400px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  margin-top: 12px;
  animation: pulse-line 3s ease-in-out infinite;
}

/* ── DAY TABS ── */
.day-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 28px;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeDown 0.9s ease both;
}

.day-tab {
  font-family: 'Orbitron', monospace;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 8px 18px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.25s;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}
.day-tab::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--accent), transparent);
  opacity: 0;
  transition: opacity 0.25s;
}
.day-tab:hover { color: var(--text); border-color: rgba(0,212,255,0.3); }
.day-tab:hover::before { opacity: 0.05; }
.day-tab.active {
  color: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 16px rgba(0,212,255,0.25), inset 0 0 12px rgba(0,212,255,0.05);
}
.day-tab.active::before { opacity: 0.08; }

/* ── BLOCK SELECTOR ── */
.blocks {
  display: flex;
  gap: 8px;
  margin-bottom: 32px;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeDown 1s ease both;
}

.block-btn {
  font-family: 'Exo 2', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 9px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.25s;
  backdrop-filter: blur(8px);
}
.block-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
.block-btn.active {
  background: rgba(0,212,255,0.1);
  color: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 20px rgba(0,212,255,0.2);
}

/* ── SCHEDULE INFO ── */
.schedule-info {
  font-size: 0.75rem;
  color: var(--muted);
  font-weight: 400;
  letter-spacing: 0.05em;
  margin-bottom: 28px;
  padding: 10px 20px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--panel);
  max-width: 640px;
  width: 100%;
  display: block;
  backdrop-filter: blur(8px);
}
.schedule-info strong { color: var(--text); font-weight: 700; }

/* ── WHEEL WRAP ── */
.wheel-wrap {
  position: relative;
  width: min(520px, 88vw);
  height: min(520px, 88vw);
  margin-bottom: 40px;
  animation: fadeIn 1.2s ease both;
}

@media (max-width: 640px) {
  .wheel-wrap {
    width: min(360px, 92vw);
    height: min(360px, 92vw);
    margin-bottom: 0;
  }
}

/* outer glow ring */
.wheel-wrap::before {
  content: '';
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
  animation: rotateSlow 20s linear infinite;
  pointer-events: none;
}

.wheel-svg {
  width: 100%;
  height: 100%;
  filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
}

/* ── TOKEN LAYER ── */
.token-layer {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.token {
  position: absolute;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--bg2);
  border: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', monospace;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent);
  transform: translate(-50%, -50%);
  box-shadow: 0 0 14px rgba(0,212,255,0.5), inset 0 0 8px rgba(0,212,255,0.1);
  transition: left 0.85s cubic-bezier(0.34, 1.56, 0.64, 1),
              top  0.85s cubic-bezier(0.34, 1.56, 0.64, 1);
  cursor: pointer;
  pointer-events: all;
  z-index: 10;
  animation: tokenPulse 2.5s ease-in-out infinite;
}
.token:hover {
  transform: translate(-50%,-50%) scale(1.25);
  z-index: 20;
  box-shadow: 0 0 28px rgba(0,212,255,0.9), inset 0 0 14px rgba(0,212,255,0.2);
}

.spec-badge {
  position: absolute;
  top: -5px; right: -5px;
  width: 17px; height: 17px;
  border-radius: 50%;
  font-size: 0.55rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1.5px solid var(--bg);
  z-index: 11;
}

.bienvenida-label {
  position: absolute;
  top: -22px;
  left: 50%;
  transform: translateX(-50%);
  background: #5c96b4;
  color: #fff;
  font-family: 'Exo 2', sans-serif;
  font-size: 0.52rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  white-space: nowrap;
  padding: 2px 5px;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 0 6px rgba(92,150,180,0.7);
  z-index: 12;
  pointer-events: none;
}

/* ── CENTER LOGO ── */
.center-logo .rainbow { font-size: 1.8rem; line-height: 1; }
.center-logo .brand {
  font-family: 'Orbitron', monospace;
  font-size: 0.38rem;
  color: var(--accent);
  text-align: center;
  line-height: 1.4;
  margin-top: 4px;
  letter-spacing: 0.05em;
  opacity: 0.8;
}

/* ── WHEEL + LEGEND ROW ── */
.wheel-and-legend {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 36px;
  padding-right: 0;
  position: relative;
  left: 2cm;
  width: 100%;
  max-width: 980px;
  margin-bottom: 40px;
}

/* ── LEGEND ── */
.legend {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 200px;
  flex-shrink: 0;
  animation: fadeUp 1.3s ease both;
}

/* ── RESPONSIVE MÓVIL ── */
@media (max-width: 640px) {
  body { padding: 12px 8px; }

  .wheel-and-legend {
    flex-direction: column;
    left: 0;
    gap: 24px;
    margin-bottom: 20px;
  }

  #wheelSvg {
    width: min(92vw, 360px) !important;
    height: min(92vw, 360px) !important;
  }

  .legend {
    width: 100%;
    max-width: 400px;
    flex-direction: row;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
  }

  .legend-item {
    width: calc(50% - 6px);
    padding: 8px 10px;
  }

  .legend-text { font-size: 0.72rem; }
  .legend-sub  { font-size: 0.62rem; }

  .tabs { gap: 4px; }
  .tab  { font-size: 0.7rem; padding: 6px 10px; }

  .blocks { gap: 6px; }
  .block-btn { font-size: 0.68rem; padding: 5px 8px; }

  .schedule-bar {
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    font-size: 0.72rem;
  }

  h1 { font-size: 1.1rem; }
  .subtitle { font-size: 0.7rem; }
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
}
.legend-item:hover {
  border-color: rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 8px currentColor;
}

.legend-text { font-size: 0.78rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.legend-sub  { font-size: 0.68rem; color: var(--muted); font-weight: 400; }

/* ── CONTROLS ── */
.controls {
  display: flex;
  gap: 14px;
  align-items: center;
  animation: fadeUp 1.4s ease both;
}

.play-btn {
  font-family: 'Orbitron', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  padding: 12px 28px;
  border-radius: 6px;
  border: 1px solid var(--accent);
  background: rgba(0,212,255,0.08);
  color: var(--accent);
  cursor: pointer;
  box-shadow: 0 0 20px rgba(0,212,255,0.2);
  transition: all 0.25s;
  text-transform: uppercase;
}
.play-btn:hover {
  background: rgba(0,212,255,0.15);
  box-shadow: 0 0 32px rgba(0,212,255,0.4);
  transform: translateY(-2px);
}

/* ── TOOLTIP ── */
.tooltip {
  position: fixed;
  background: var(--bg2);
  border: 1px solid rgba(0,212,255,0.3);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 0.78rem;
  font-weight: 600;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 1000;
  max-width: 220px;
  line-height: 1.6;
  backdrop-filter: blur(16px);
  box-shadow: 0 0 24px rgba(0,212,255,0.15);
}
.tooltip.show { opacity: 1; }
.tooltip .t-group { font-family: 'Orbitron', monospace; font-size: 0.7rem; color: var(--accent); letter-spacing: 0.1em; }
.tooltip .t-activity { font-size: 0.85rem; font-weight: 700; margin: 2px 0; }
.tooltip .t-desc { font-size: 0.72rem; color: var(--muted); font-weight: 400; }
.tooltip .t-special { font-size: 0.72rem; color: #a8e63d; margin-top: 4px; font-style: italic; }

/* ── ANIMATIONS ── */
@keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeUp   { from { opacity:0; transform:translateY(20px);  } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn   { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
@keyframes pulse-line { 0%,100% { opacity:0.4; } 50% { opacity:1; } }
@keyframes rotateSlow { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
@keyframes tokenPulse {
  0%,100% { box-shadow: 0 0 14px rgba(0,212,255,0.5), inset 0 0 8px rgba(0,212,255,0.1); }
  50%      { box-shadow: 0 0 22px rgba(0,212,255,0.8), inset 0 0 12px rgba(0,212,255,0.15); }
}
@keyframes segGlow {
  0%,100% { opacity: 0.88; }
  50%      { opacity: 1; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grain"></div>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="brand-line">Vida en Arte Kids · Sistema de Rotación</div>
    <div class="day-title" id="dayTitle">Lunes</div>
    <div class="scanline"></div>
  </div>

  <!-- DAY TABS -->
  <div class="day-tabs">
    <button class="day-tab active" onclick="setDay(0)">Lunes</button>
    <button class="day-tab" onclick="setDay(1)">Martes</button>
    <button class="day-tab" onclick="setDay(2)">Miércoles</button>
    <button class="day-tab" onclick="setDay(3)">Jueves</button>
    <button class="day-tab" onclick="setDay(4)">Viernes</button>
  </div>

  <!-- BLOCK SELECTOR -->
  <div class="blocks">
    <button class="block-btn active" onclick="setBlock(0)">7:45 – 9:00</button>
    <button class="block-btn" onclick="setBlock(1)">9:00 – 10:15</button>
    <button class="block-btn" onclick="setBlock(2)">10:15 – 11:00</button>
    <button class="block-btn" onclick="setBlock(3)">11:00 – 12:15</button>
  </div>

  <!-- INFO -->
  <div class="schedule-info" id="scheduleInfo"></div>

  <div class="wheel-and-legend">
  <!-- WHEEL -->
  <div class="wheel-wrap" id="wheelWrap">
    <svg class="wheel-svg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg" id="wheelSvg"></svg>
    <div class="token-layer" id="tokenLayer"></div>
  </div>

  <!-- LEGEND -->
  <div class="legend" id="legend"></div>
  </div><!-- end wheel-and-legend -->

  <!-- CONTROLS -->
  <div class="controls">
    <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ Auto Play</button>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
// ── PARTICLES ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function initParticles() {
  particles = [];
  const count = Math.floor((canvas.width * canvas.height) / 14000);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      alpha: Math.random() * 0.5 + 0.1,
    });
  }
}

function drawParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,212,255,${p.alpha})`;
    ctx.fill();
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = canvas.width;
    if (p.x > canvas.width) p.x = 0;
    if (p.y < 0) p.y = canvas.height;
    if (p.y > canvas.height) p.y = 0;
  }
  requestAnimationFrame(drawParticles);
}

resizeCanvas(); initParticles(); drawParticles();
window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });

// ── DATA ──────────────────────────────────────────────────────────────────
const STATIONS = [
  { label: "Let's Play",    sub: 'Parkids',     color: '#5c96b4', glow: '#5c96b4', emoji: '🏃', desc: 'Parkour adaptado — coordinación, equilibrio, fuerza' },
  { label: "Let's Grow",    sub: '',            color: '#ff2d3a', glow: '#ff2d3a', emoji: '🌱', desc: 'Resolución de problemas — pensamiento lógico' },
  { label: "Let's Create",  sub: '',            color: '#ff6b1a', glow: '#ff6b1a', emoji: '🎨', desc: 'Artes plásticas — expresión visual y motricidad' },
  { label: "Let's Be",      sub: '',            color: '#1a9bbf', glow: '#1a9bbf', emoji: '💙', desc: 'Socioemocional — autoestima y empatía' },
  { label: "Let's Play",    sub: 'Aerial Play', color: '#5c96b4', glow: '#5c96b4', emoji: '🎪', desc: 'Telas, aro y trapecio — fuerza y superación' },
  { label: "Let's Count",   sub: '& Read',      color: '#a8e63d', glow: '#a8e63d', emoji: '🔢', desc: 'Numeración y lectoescritura — multisensorial' },
  { label: "Let's Speak",   sub: '',            color: '#ffe800', glow: '#ffe800', emoji: '🎭', desc: 'Teatro, música y poesía — comunicación' },
  { label: "Let's Discover",sub: '',            color: '#d527c9', glow: '#d527c9', emoji: '🔬', desc: 'Ciencias — curiosidad y método científico' },
];

const DAY_NAMES   = ['Lunes','Martes','Miércoles','Jueves','Viernes'];
const DAY_OFFSETS = [0, 4, 0, 4, 0];
const N = 8;
let currentDay = 0, currentBlock = 0, autoInterval = null;

function getStation(g, day, block) {
  return ((g + DAY_OFFSETS[day]) % N + block) % N;
}

// ── HIGHLIGHT ────────────────────────────────────────────────────────────
let highlightedStation = null;

function highlightStation(si) {
  highlightedStation = si;
  redrawWheel();
}

function clearHighlight() {
  highlightedStation = null;
  redrawWheel();
}

function redrawWheel() {
  const svg = document.getElementById('wheelSvg');
  const cx = 250, cy = 250, outerR = 228, innerR = 108;
  const sliceAngle = (2 * Math.PI) / N;
  const startOffset = -Math.PI / 2 - Math.PI / 8;
  let html = '';

  html += `<circle cx="250" cy="250" r="235" fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>`;
  html += `<circle cx="250" cy="250" r="100" fill="none" stroke="rgba(0,212,255,0.12)" stroke-width="1"/>`;

  for (let i = 0; i < 64; i++) {
    const a = startOffset + (i / 64) * 2 * Math.PI;
    const r1 = 236, r2 = i % 8 === 0 ? 243 : 239;
    html += `<line x1="${250 + r1*Math.cos(a)}" y1="${250 + r1*Math.sin(a)}" x2="${250 + r2*Math.cos(a)}" y2="${250 + r2*Math.sin(a)}" stroke="rgba(0,212,255,0.25)" stroke-width="1"/>`;
  }

  for (let i = 0; i < N; i++) {
    const st = STATIONS[i];
    const a1 = startOffset + i * sliceAngle;
    const a2 = a1 + sliceAngle;
    const gap = 0.03;

    const x1 = cx + outerR * Math.cos(a1+gap), y1 = cy + outerR * Math.sin(a1+gap);
    const x2 = cx + outerR * Math.cos(a2-gap), y2 = cy + outerR * Math.sin(a2-gap);
    const x3 = cx + innerR * Math.cos(a2-gap), y3 = cy + innerR * Math.sin(a2-gap);
    const x4 = cx + innerR * Math.cos(a1+gap), y4 = cy + innerR * Math.sin(a1+gap);
    const d = `M${x1},${y1} A${outerR},${outerR} 0 0,1 ${x2},${y2} L${x3},${y3} A${innerR},${innerR} 0 0,0 ${x4},${y4} Z`;

    const mid = a1 + sliceAngle / 2;
    // La franja ocupa el borde exterior: de outerR hacia adentro bandW px
    const bandW = 30;
    const bandR = outerR - bandW; // radio interior de la franja

    // Centro de texto de la actividad: en la zona interior (bajo la franja si hay especial)
    const textR = (bandR + innerR) / 2;
    const tx = cx + textR * Math.cos(mid);
    const ty = cy + textR * Math.sin(mid);
    // Voltear texto en mitad inferior para legibilidad
    const midNorm = ((mid % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
    const isBottom = midNorm > 0 && midNorm < Math.PI;
    const rot = isBottom ? (mid * 180 / Math.PI) + 90 + 180 : (mid * 180 / Math.PI) + 90;

    const specialLabel = currentBlock===0 ? '👋 Bienvenida'
                        : currentBlock===1 ? '🍎 Let\'s Eat'
                        : currentBlock===3 ? '🌿 Let\'s Relax' : null;

    // Colores de franja según tipo de actividad especial
    const bandColor = currentBlock===0 ? '#22c55e'   // verde Bienvenida
                    : currentBlock===1 ? '#f97316'   // naranja Let's Eat
                    : currentBlock===3 ? '#8b5cf6'   // violeta Let's Relax
                    : null;

    const lines = [st.emoji, st.label];
    if (st.sub) lines.push(st.sub);

    const isLight = st.color === '#ffe800' || st.color === '#a8e63d';
    const textFill = isLight ? '#111' : 'white';
    const strokeC  = isLight ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.5)';

    const isHighlighted = highlightedStation === i;
    const isDimmed = highlightedStation !== null && !isHighlighted;
    const opacity = isDimmed ? '0.2' : '1';
    const extraGlow = isHighlighted ? `filter: drop-shadow(0 0 12px ${st.color})` : '';

    const gid = `gr${i}`;
    html += `<defs>
      <radialGradient id="${gid}" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="${st.color}" stop-opacity="1"/>
        <stop offset="100%" stop-color="${st.color}" stop-opacity="0.7"/>
      </radialGradient>
    </defs>`;
    html += `<path d="${d}" fill="url(#${gid})" opacity="${opacity}" style="${extraGlow}"/>`;

    if (isHighlighted) {
      html += `<path d="${d}" fill="none" stroke="white" stroke-width="2.5" opacity="0.8"/>`;
    }

    // ── Franja de actividad especial (arco en el borde exterior) ──────────
    if (specialLabel && bandColor) {
      const bx1 = cx + outerR  * Math.cos(a1+gap), by1 = cy + outerR  * Math.sin(a1+gap);
      const bx2 = cx + outerR  * Math.cos(a2-gap), by2 = cy + outerR  * Math.sin(a2-gap);
      const bx3 = cx + bandR   * Math.cos(a2-gap), by3 = cy + bandR   * Math.sin(a2-gap);
      const bx4 = cx + bandR   * Math.cos(a1+gap), by4 = cy + bandR   * Math.sin(a1+gap);
      const bd  = `M${bx1},${by1} A${outerR},${outerR} 0 0,1 ${bx2},${by2} L${bx3},${by3} A${bandR},${bandR} 0 0,0 ${bx4},${by4} Z`;
      html += `<path d="${bd}" fill="${bandColor}" opacity="${opacity}" style="filter:brightness(1.1)"/>`;

      // Texto de la franja centrado en ella
      const bandTextR = (outerR + bandR) / 2;
      const btx = cx + bandTextR * Math.cos(mid);
      const bty = cy + bandTextR * Math.sin(mid);
      html += `<g transform="translate(${btx},${bty}) rotate(${rot})" opacity="${opacity}">
        <text x="0" y="4" text-anchor="middle" fill="white" font-family="Exo 2,sans-serif" font-size="10" font-weight="700" paint-order="stroke" stroke="rgba(0,0,0,0.4)" stroke-width="2">${specialLabel}</text>
      </g>`;

      // Línea separadora entre franja y segmento
      const lx1 = cx + bandR * Math.cos(a1+gap), ly1 = cy + bandR * Math.sin(a1+gap);
      const lx2 = cx + bandR * Math.cos(a2-gap), ly2 = cy + bandR * Math.sin(a2-gap);
      html += `<path d="M${lx1},${ly1} A${bandR},${bandR} 0 0,1 ${lx2},${ly2}" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" opacity="${opacity}"/>`;
    }

    // Línea interior del segmento (borde del hueco central)
    const ex1 = cx + (innerR+1)*Math.cos(a1+gap), ey1 = cy + (innerR+1)*Math.sin(a1+gap);
    const ex2 = cx + (innerR+1)*Math.cos(a2-gap), ey2 = cy + (innerR+1)*Math.sin(a2-gap);
    html += `<path d="M${ex1},${ey1} A${innerR+1},${innerR+1} 0 0,1 ${ex2},${ey2}" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" opacity="${opacity}"/>`;

    html += `<g transform="translate(${tx},${ty}) rotate(${rot})" opacity="${opacity}">`;
    const lineH = 15;
    const totalH = lines.length * lineH;
    lines.forEach((line, li) => {
      const dy = -totalH/2 + li*lineH + 7;
      let fs, fw;
      {
        fs = li===0 ? '14' : (li===1 ? '13' : '11');
        fw = li===1 ? '800' : '600';
      }
      html += `<text x="0" y="${dy}" text-anchor="middle" fill="${textFill}" font-family="Exo 2,sans-serif" font-size="${fs}" font-weight="${fw}" paint-order="stroke" stroke="${strokeC}" stroke-width="2.5">${line}</text>`;
    });
    html += `</g>`;
  }

  html += `<circle cx="250" cy="250" r="104" fill="none" stroke="rgba(0,212,255,0.25)" stroke-width="1.5"/>`;

// ── TOKENS ────────────────────────────────────────────────────────────────
function getTokenPos(si) {
  const cx=250, cy=250, r=250;
  const sliceAngle = (2*Math.PI)/N;
  const mid = -Math.PI/2 - Math.PI/8 + si*sliceAngle + sliceAngle/2;
  const size = Math.min(520, window.innerWidth*0.88);
  const scale = size/500;
  return { x:(cx+r*Math.cos(mid))*scale, y:(cy+r*Math.sin(mid))*scale };
}

function buildTokens() {
  const layer = document.getElementById('tokenLayer');
  layer.innerHTML = '';
  for (let g=0; g<N; g++) {
    const div = document.createElement('div');
    div.className = 'token';
    div.id = `token-${g}`;
    div.textContent = g+1;
    div.dataset.group = g;
    div.style.animationDelay = `${g*0.3}s`;
    div.addEventListener('mouseenter', showTooltip);
    div.addEventListener('mouseleave', hideTooltip);
    div.addEventListener('mousemove', moveTooltip);
    layer.appendChild(div);
  }
  positionTokens(false);
}

function positionTokens(animate) {
  for (let g=0; g<N; g++) {
    const si = getStation(g, currentDay, currentBlock);
    const pos = getTokenPos(si);
    const el = document.getElementById(`token-${g}`);
    if (!animate) { el.style.transition='none'; setTimeout(()=>{ el.style.transition=''; },50); }
    el.style.left = pos.x+'px';
    el.style.top  = pos.y+'px';

    el.querySelectorAll('.spec-badge').forEach(b=>b.remove());
    const bd = currentBlock===1 ? {emoji:'🍎',bg:'#ff6b1a'}
             : currentBlock===3 ? {emoji:'🌿',bg:'#a8e63d'} : null;
    if (bd) {
      const badge = document.createElement('div');
      badge.className = 'spec-badge';
      badge.style.background = bd.bg;
      badge.textContent = bd.emoji;
      el.appendChild(badge);
    }
  }
}

// ── TOOLTIP ──────────────────────────────────────────────────────────────
function showTooltip(e) {
  const g = parseInt(e.target.closest('.token').dataset.group);
  const si = getStation(g, currentDay, currentBlock);
  const st = STATIONS[si];
  const extra = currentBlock===0 ? '<div class="t-special">👋 Primeros 15 min: Bienvenida</div>'
              : currentBlock===1 ? '<div class="t-special">🍎 Últimos 20 min: Let\'s Eat</div>'
              : currentBlock===3 ? '<div class="t-special">🌿 Últimos 15 min: Let\'s Relax</div>' : '';
  const tip = document.getElementById('tooltip');
  tip.innerHTML = `
    <div class="t-group">Grupo ${g+1} · ${DAY_NAMES[currentDay]}</div>
    <div class="t-activity">${st.emoji} ${st.label}${st.sub?' '+st.sub:''}</div>
    <div class="t-desc">${st.desc}</div>
    ${extra}`;
  tip.classList.add('show');
}
function hideTooltip()  { document.getElementById('tooltip').classList.remove('show'); }
function moveTooltip(e) {
  const t = document.getElementById('tooltip');
  t.style.left = (e.clientX+16)+'px';
  t.style.top  = (e.clientY-10)+'px';
}

// ── SCHEDULE INFO ─────────────────────────────────────────────────────────
function updateScheduleInfo() {
  const row = (left, right) => `<span style="display:flex;justify-content:space-between;align-items:center;gap:16px;width:100%"><span>${left}</span><span style="color:var(--accent)">${right}</span></span>`;
  const infos = [
    row('🔄 Actividad de rotación', '👋 <strong>Primeros 15 min:</strong> Bienvenida — saludo, agenda, canciones'),
    row('🔄 Actividad de rotación', '🍎 <strong>Últimos 20 min:</strong> Let\'s Eat — hábitos, higiene, autonomía'),
    '<span style="width:100%;text-align:center">🔄 Actividad de rotación completa</span>',
    row('🔄 Actividad de rotación', '🌿 <strong>Últimos 15 min:</strong> Let\'s Relax — respiración y visualización'),
  ];
  document.getElementById('scheduleInfo').innerHTML = infos[currentBlock];
}

// ── CONTROLS ─────────────────────────────────────────────────────────────
function setDay(d, fromAuto) {
  currentDay=d; currentBlock=0;
  document.getElementById('dayTitle').textContent = DAY_NAMES[d];
  document.querySelectorAll('.day-tab').forEach((b,i)=>b.classList.toggle('active',i===d));
  document.querySelectorAll('.block-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  positionTokens(false); updateScheduleInfo();
  if(!fromAuto && autoInterval){ clearInterval(autoInterval); autoInterval=null; document.getElementById('playBtn').textContent='▶ Auto Play'; }
}

function setBlock(b) {
  currentBlock=b;
  document.querySelectorAll('.block-btn').forEach((btn,i)=>btn.classList.toggle('active',i===b));
  redrawWheel(); positionTokens(true); updateScheduleInfo();
}

function togglePlay() {
  const btn = document.getElementById('playBtn');
  if(autoInterval){
    clearInterval(autoInterval);
    autoInterval = null;
    btn.textContent = '▶ Auto Play';
    return;
  }

  // Secuencia completa: avanza bloque a bloque,
  // al terminar el bloque 3 pasa al día siguiente automáticamente
  btn.textContent = '⏸ Pausar';

  function nextStep() {
    const nextBlock = (currentBlock + 1) % 4;

    if(nextBlock === 0) {
      // Terminó el día → avanzar al siguiente
      const nextDay = (currentDay + 1) % 5;
      setDay(nextDay, true);       // setDay resetea a bloque 0
      setBlock(0);
    } else {
      setBlock(nextBlock);
    }
  }

  autoInterval = setInterval(nextStep, 2800);
}

// ── LEGEND ────────────────────────────────────────────────────────────────
function buildLegend() {
  document.getElementById('legend').innerHTML = STATIONS.map((st,i)=>`
    <div class="legend-item" data-station="${i}" onmouseenter="highlightStation(${i})" onmouseleave="clearHighlight()">
      <div class="legend-dot" style="background:${st.color};box-shadow:0 0 8px ${st.color}"></div>
      <div>
        <div class="legend-text">${st.emoji} ${st.label}${st.sub?` <span style="opacity:0.55;font-weight:400">${st.sub}</span>`:''}</div>
        <div class="legend-sub">${st.desc.split(' — ')[0]}</div>
      </div>
    </div>
  `).join('');
}

window.addEventListener('resize', ()=>positionTokens(false));
drawWheel(); buildTokens(); buildLegend(); updateScheduleInfo();
</script>
</body>
</html>
